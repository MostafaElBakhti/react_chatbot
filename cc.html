<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div class="container"></div>
    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">

        function Counter ( {counter, setCounter , ClickButton} ) {
            return (
                <>
                    { counter == 1 && (<button onClick={ClickButton} >Clicked {counter} time</button>)}
                    { counter != 1 && (<button onClick={ClickButton} >Clicked {counter} times</button>)}

                </>
            )
        }

        function App() {
            const [counter , setCounter] = React.useState(0)

            function ClickButton() {                
                setCounter(counter + 1)
                
            }
            
            return (
                <>
                    < Counter  counter={counter} setCounter={setCounter} ClickButton={ClickButton} />
                    < Counter  counter={counter} setCounter={setCounter} ClickButton={ClickButton} />
                    <button  onClick={ () => setCounter(0) } >Reset</button>

                </>
            )
        } 


        const container = document.querySelector('.container')
        ReactDOM.createRoot(container).render(<App />)
        

    </script>
</body>
</html>
