<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <!-- <script src="react-basics.js"></script> -->

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ChatInput() {
            return (
                <>
                    <input placeholder='type anythings'  size='30'/>
                    <button>Send</button>
                </>
            )
        }

        function ChatMessage( {sender , message} ) { 
            
            // const messages = []

            return (
                <div>
                    {sender === 'user' && (<img src="user.png" width="50px" />)}
                    {message}
                    {sender === 'robot' && (<img src="robot.png" width="50px" />)}
                </div>
            )
        }

        function ChatMessages( {chatMessages} ) {
            return (
                <>
                    {chatMessages.map( (chatMessage) => {
                        return (
                                < ChatMessage message={chatMessage.message} sender={chatMessage.sender} key={chatMessage.id} />
                        )
                    })}
                </>
            )
        }

        function App() {

            const [ chatMessages , setChatMessages ] = React.useState([
                {message: 'hello chatbot',sender: 'user' , id: '1'},
                {message: 'hi ! how can i help you today',sender: 'robot' , id: '2'},
                {message: 'say "slak ajmi"',sender: 'user' , id: '3'},
                {message: 'of course , slak ajmi',sender: 'robot' , id: '4'}
            
            ])
            // chatMessages.map( (test) => {
            //     return (
            //         <ChatMessage message= {test.message} sender={test.sender} id={test.id} />
            //     )
            // } ) ; 
            

            return (
                <>
                    <ChatInput />
                    <ChatMessages chatMessages={chatMessages} />
                </>
            )
        }
    

      const container = document.querySelector('.js-container')
      ReactDOM.createRoot(container).render(<App />)
    </script>
  </body>
</html>
