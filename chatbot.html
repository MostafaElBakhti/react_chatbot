<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput() {
        return (
          <>
            <input placeholder="Send Message to the chatbot" size="30" />
            <button >Send</button>
          </>
        )
      }

      function ChatMessage({message , sender}) {
        // const message = props.message
        // const sender = props.sender

        // const {sender ,message } = props

        // if (sender === "robot"){
        //   return (
        //   <div>
        //     <img src="robot.png" width="50px"/>
        //     {message}  
        //   </div>
        //   )
        // } 
          return (
            <div>
              {sender === "user" && (<img src="robot.png" width="50px"/>)}
              {message}
              {sender === "robot" && (<img src="user.png" width="50px"/>)}
            </div>
          )
      }

      function App() {

        const chatMessages = [
          {message: 'hello chatbot',sender: 'user'},
          {message: 'hello! how can I help you?',sender: 'robot'},
          {message: 'can you get me todays date',sender: 'user'},
          {message: 'Today is september 27',sender: 'robot'},

        
        ]

        const chatMessageComponents = chatMessages.map( (chatMessage) => {
          return (
            <ChatMessage message= {chatMessage.message} sender = {chatMessage.sender} />
          )
        });

        return (
          <>
            <ChatInput />
            {chatMessageComponents}
          </>
        )
      }

      const container = document.querySelector('.js-container')
      ReactDOM.createRoot(container).render(<App />)
    </script>
  </body>
</html>
