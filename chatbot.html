<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput() {
        return (
          <>
            <input placeholder="Send Message to the chatbot" size="30" />
            <button >Send</button>
          </>
        )
      }

      function ChatMessage({message , sender}) {
          return (
            <div>
              {sender === "user" && (<img src="user.png" width="50px"/>)}
              {message}
              {sender === "robot" && (<img src="robot.png" width="50px"/>)}
            </div>
          )
      } 

      function ChatMessages() {

        const array = React.useState([
          {message: 'hello chatbot',sender: 'user' , id: '1'},
          {message: 'hello! how can I help you?',sender: 'robot' , id: '2'},
          {message: 'can you get me todays date',sender: 'user' , id: '3'},
          {message: 'Today is september 27',sender: 'robot' , id: '4'}
        
        ])
        
        const chatMessages = array[0]
        const setChatMessages =  array[1]

        function sendMessage() {
          setChatMessages([
            ...chatMessages,
            {
              message: 'test',
              sender: 'user',
              id: crypto.randomUUID()
            }
          ])
        } 
        
        return (
          <>
            <button onClick = { sendMessage } >Click Here </button>

            {chatMessages.map( (chatMessage) => {
              return (
                
                <ChatMessage 
                  message= {chatMessage.message} 
                  sender = {chatMessage.sender} 
                  key= {chatMessage.id}
                />
              )
            })}
          </>
        )
      }

      function App() {

        return (
          <>
            <ChatInput />
            <ChatMessages />

          </>
        )
      }

      const container = document.querySelector('.js-container')
      ReactDOM.createRoot(container).render(<App />)
    </script>
  </body>
</html>
