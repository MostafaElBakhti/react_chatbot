<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        display: flex;
        
      }
      .js-container {
        padding: 10px ;
        border : 5px solid black ;
        margin: auto;
        height: 100vh;
        /* width: ; */
      }
      


      .send-button {
        background-color: rgb(68, 138, 68);
        border: none ;
        font-size: 15px  ;
        padding: 12px 20px;
        border-radius: 5px;
        color: white;
        margin-left: 10px ;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto ;
        margin-right: auto ;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="react-basics.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput( {chatMessages, setChatMessages}) {

        const [inputText, setInputText] = React.useState('')

        function saveInputText(event) {
          setInputText(event.target.value)
        }

        function sendMessage() {

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }]

          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText)

          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          

          setInputText('');

        }

        return (
          <div className="chat-input-container" >
            <input 
              placeholder="Send Message to the chatbot" 
              size="30" 
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
            />
            <button 
              onClick={sendMessage} 
              className="send-button"
            >Send</button>
          </div>
        )
      }

      function ChatMessage({message , sender}) {
          return (
            <div className={ sender ===
               'user' ? 'chat-message-user' : 
               'chat-message-robot' } >
              {sender === "robot" && (<img src="robot.png" width="50px"/>)}
              {message}
              {sender === "user" && (<img src="user.png" width="50px"/>)}
            </div>
          )
      } 

      function ChatMessages( {chatMessages} ) {

        return (
          <>
            {chatMessages.map( (chatMessage) => {
              return (
                
                <ChatMessage 
                  message= {chatMessage.message} 
                  sender = {chatMessage.sender} 
                  key= {chatMessage.id}
                />
              )
            })}
          </>
        )
      }

      function App() {

        const [chatMessages , setChatMessages] = React.useState([
          {message: 'hello chatbot',sender: 'user' , id: '1'},
          {message: 'hello! how can I help you?',sender: 'robot' , id: '2'},
          {message: 'can you get me todays date',sender: 'user' , id: '3'},
          {message: 'Today is september 27',sender: 'robot' , id: '4'}
        
        ])

        return (
          <div className="app-container" >
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}

            />
            <ChatMessages 
              chatMessages={chatMessages}
            />

          </div>
        )
      }

      const container = document.querySelector('.js-container')
      ReactDOM.createRoot(container).render(<App />)
    </script>
  </body>
</html>
